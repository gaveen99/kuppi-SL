# Drop into /etc/nginx/conf.d/ or include from your your-domain.com server block.
# Serves past papers from disk with long cache headers so Cloudflare (and
# browser caches) keep them out of your origin.
#
# Origin path: /var/kuppi/papers/<level>/<year>/<file>.pdf
# Public URL:  https://your-domain.com/papers/<level>/<year>/<file>.pdf

location /papers/ {
    alias /var/kuppi/papers/;

    # Cache for 30 days at edge + browser. PDFs are immutable once published.
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable" always;

    # Don't list directories
    autoindex off;

    # Hide hidden files (.manifest.json etc.)
    location ~ /\. {
        deny all;
    }

    # CORS — let your-domain.com JS read PDF metadata if needed (e.g. for preview iframes)
    add_header Access-Control-Allow-Origin "https://your-domain.com" always;
    add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Only serve PDFs — block anything else accidentally placed in the tree
    location ~* \.pdf$ {
        types { application/pdf pdf; }
        try_files $uri =404;
    }
    location ~* \.(json|tmp|part)$ { deny all; }
}
